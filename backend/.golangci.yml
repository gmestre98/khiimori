# golangci-lint configuration — deliberately minimal (one linter/formatter per
# language, no premature strictness). Keeps the default linters and adds
# formatting checks so `golangci-lint run` is the single backend lint command.
run:
  timeout: 5m

linters:
  # Keep golangci-lint's sensible defaults (errcheck, gosimple, govet,
  # ineffassign, staticcheck, unused) and add formatting linters.
  enable:
    - gofmt
    - goimports

linters-settings:
  goimports:
    # Group our own module's imports separately from third-party ones.
    local-prefixes: github.com/gmestre98/eudaimonia/backend

issues:
  # Show every issue rather than golangci-lint's default per-linter cap.
  max-issues-per-linter: 0
  max-same-issues: 0
