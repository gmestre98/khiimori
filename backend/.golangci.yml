# golangci-lint v2 configuration — deliberately minimal. Keeps the default
# linters and adds formatting checks so `golangci-lint run` is the single
# backend lint command.
version: "2"

run:
  timeout: 5m

linters:
  # Keep golangci-lint's sensible defaults (errcheck, gosimple, govet,
  # ineffassign, staticcheck, unused).
  default: standard

formatters:
  # Enforce gofmt + goimports formatting.
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Group our own module's imports separately from third-party ones.
      local-prefixes:
        - github.com/gmestre98/khiimori/backend

issues:
  # Show every issue rather than golangci-lint's default per-linter cap.
  max-issues-per-linter: 0
  max-same-issues: 0
