<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ink{fill:#111111}
    .muted{fill:#777777}
    .line{stroke:#e4e4e4;stroke-width:1}
    .card{fill:#ffffff;stroke:#e0e0e0;stroke-width:1.5}
    .chip{fill:#111111}
    .chipt{fill:#ffffff}
    .accent{fill:#2f6f6a}
    .accent2{fill:#b06a2c}
  </style>

  <!-- browser frame -->
  <rect x="20" y="20" width="860" height="580" rx="12" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <rect x="20" y="20" width="860" height="44" rx="12" fill="#111111"/>
  <rect x="20" y="52" width="860" height="12" fill="#111111"/>
  <circle cx="44" cy="42" r="6" fill="#ffffff"/>
  <circle cx="66" cy="42" r="6" fill="#ffffff" opacity="0.6"/>
  <circle cx="88" cy="42" r="6" fill="#ffffff" opacity="0.35"/>
  <rect x="280" y="32" width="340" height="20" rx="10" fill="#2b2b2b"/>
  <text x="300" y="46" class="chipt" font-size="11">khiimori.app/trips/japan/day-4</text>

  <!-- title row -->
  <text x="44" y="96" class="ink" font-size="20" font-weight="bold">Japan — Day 4 · Kyoto</text>
  <text x="44" y="116" class="muted" font-size="12">Friday, Apr 05 2026</text>

  <!-- day selector strip -->
  <g font-size="11">
    <rect x="560" y="80" width="34" height="34" rx="8" fill="#f3f3f3"/><text x="571" y="96" class="muted">D3</text><text x="569" y="108" class="muted" font-size="9">04</text>
    <rect x="600" y="80" width="34" height="34" rx="8" class="chip"/><text x="611" y="96" class="chipt">D4</text><text x="609" y="108" class="chipt" font-size="9">05</text>
    <rect x="640" y="80" width="34" height="34" rx="8" fill="#f3f3f3"/><text x="651" y="96" class="muted">D5</text><text x="649" y="108" class="muted" font-size="9">06</text>
    <rect x="680" y="80" width="34" height="34" rx="8" fill="#f3f3f3"/><text x="691" y="96" class="muted">D6</text><text x="689" y="108" class="muted" font-size="9">07</text>
    <rect x="720" y="80" width="34" height="34" rx="8" fill="#f3f3f3"/><text x="731" y="96" class="muted">D7</text><text x="729" y="108" class="muted" font-size="9">08</text>
  </g>
  <line x1="44" y1="132" x2="856" y2="132" class="line"/>

  <!-- LEFT: itinerary timeline -->
  <text x="44" y="160" class="muted" font-size="11" font-weight="bold">ITINERARY</text>

  <!-- stay card -->
  <rect x="44" y="172" width="300" height="60" rx="10" class="card"/>
  <rect x="44" y="172" width="6" height="60" class="accent"/>
  <text x="64" y="194" class="ink" font-size="13" font-weight="bold">🛏  Stay · Hotel Mume</text>
  <text x="64" y="214" class="muted" font-size="11">Gion district · check-out 11:00</text>

  <!-- timeline line -->
  <line x1="64" y1="250" x2="64" y2="470" stroke="#cfcfcf" stroke-width="2"/>

  <circle cx="64" cy="262" r="5" class="accent"/>
  <rect x="84" y="248" width="260" height="52" rx="8" class="card"/>
  <text x="98" y="268" class="ink" font-size="12" font-weight="bold">09:00 · Fushimi Inari Shrine</text>
  <text x="98" y="287" class="muted" font-size="10">Activity · 2h · ¥0</text>

  <circle cx="64" cy="324" r="5" class="accent2"/>
  <rect x="84" y="310" width="260" height="52" rx="8" class="card"/>
  <text x="98" y="330" class="ink" font-size="12" font-weight="bold">12:30 · Nishiki Market lunch</text>
  <text x="98" y="349" class="muted" font-size="10">Food · ¥2,200</text>

  <circle cx="64" cy="386" r="5" class="accent"/>
  <rect x="84" y="372" width="260" height="52" rx="8" class="card"/>
  <text x="98" y="392" class="ink" font-size="12" font-weight="bold">15:00 · Tea ceremony (tour)</text>
  <text x="98" y="411" class="muted" font-size="10">Activity · booked · ¥4,500</text>

  <circle cx="64" cy="448" r="5" fill="#cfcfcf"/>
  <rect x="84" y="434" width="260" height="36" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="98" y="456" class="muted" font-size="11">+ Add activity / transport</text>

  <!-- budget mini -->
  <rect x="44" y="486" width="300" height="92" rx="10" class="card"/>
  <text x="62" y="510" class="muted" font-size="11" font-weight="bold">DAY BUDGET</text>
  <text x="62" y="534" class="ink" font-size="11">Stay ¥0 · Transport ¥780 · Food ¥3,400</text>
  <text x="62" y="552" class="ink" font-size="11">Activities ¥4,500 · Other ¥0</text>
  <rect x="62" y="562" width="264" height="7" rx="3" fill="#eeeeee"/>
  <rect x="62" y="562" width="150" height="7" rx="3" class="accent"/>
  <text x="232" y="510" class="ink" font-size="12" font-weight="bold">¥8,680 / ¥12,000</text>

  <!-- RIGHT: map -->
  <text x="372" y="160" class="muted" font-size="11" font-weight="bold">MAP · DAY 4 ROUTE</text>
  <rect x="372" y="172" width="484" height="300" rx="10" fill="#eef1f0" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- fake map streets -->
  <g stroke="#dfe4e2" stroke-width="6">
    <line x1="372" y1="240" x2="856" y2="262"/>
    <line x1="372" y1="330" x2="856" y2="312"/>
    <line x1="372" y1="410" x2="856" y2="430"/>
    <line x1="470" y1="172" x2="500" y2="472"/>
    <line x1="640" y1="172" x2="670" y2="472"/>
    <line x1="760" y1="172" x2="780" y2="472"/>
  </g>
  <!-- route path -->
  <path d="M 470 410 Q 540 360 600 300 T 740 230" fill="none" stroke="#2f6f6a" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"/>
  <!-- pins -->
  <g>
    <circle cx="470" cy="410" r="11" class="accent"/><text x="466" y="414" class="chipt" font-size="10">1</text>
    <circle cx="600" cy="300" r="11" class="accent2"/><text x="596" y="304" class="chipt" font-size="10">2</text>
    <circle cx="740" cy="230" r="11" class="accent"/><text x="736" y="234" class="chipt" font-size="10">3</text>
  </g>
  <circle cx="500" cy="455" r="6" fill="#111111"/><text x="514" y="459" class="muted" font-size="10">Hotel Mume</text>

  <!-- journal entry -->
  <text x="372" y="500" class="muted" font-size="11" font-weight="bold">DAY JOURNAL</text>
  <rect x="372" y="512" width="484" height="66" rx="10" class="card"/>
  <text x="390" y="536" class="ink" font-size="11">"The orange torii gates went on forever. We got lost</text>
  <text x="390" y="554" class="ink" font-size="11">near the top but found the best ramen of the trip..."</text>
  <text x="390" y="572" class="accent" font-size="10">📷 3 photos · edit entry</text>
</svg>
