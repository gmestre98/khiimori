<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .bg{fill:#ffffff}
    .ink{fill:#111111}
    .muted{fill:#777777}
    .line{stroke:#e4e4e4;stroke-width:1}
    .card{fill:#ffffff;stroke:#e0e0e0;stroke-width:1.5}
    .chip{fill:#111111}
    .chipt{fill:#ffffff}
    .accent{fill:#2f6f6a}
  </style>

  <!-- browser frame -->
  <rect x="20" y="20" width="860" height="580" rx="12" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <rect x="20" y="20" width="860" height="44" rx="12" fill="#111111"/>
  <rect x="20" y="52" width="860" height="12" fill="#111111"/>
  <circle cx="44" cy="42" r="6" fill="#ffffff"/>
  <circle cx="66" cy="42" r="6" fill="#ffffff" opacity="0.6"/>
  <circle cx="88" cy="42" r="6" fill="#ffffff" opacity="0.35"/>
  <rect x="300" y="32" width="300" height="20" rx="10" fill="#2b2b2b"/>
  <text x="320" y="46" class="chipt" font-size="11">khiimori.app/trips</text>

  <!-- sidebar -->
  <rect x="20" y="64" width="170" height="536" fill="#fafafa"/>
  <line x1="190" y1="64" x2="190" y2="600" class="line"/>
  <text x="44" y="104" class="ink" font-size="18" font-weight="bold">Khiimori</text>
  <circle cx="50" cy="140" r="4" class="accent"/>
  <text x="64" y="145" class="ink" font-size="13" font-weight="bold">Trips</text>
  <text x="64" y="178" class="muted" font-size="13">Map</text>
  <text x="64" y="211" class="muted" font-size="13">Journal</text>
  <text x="64" y="244" class="muted" font-size="13">Budget</text>
  <text x="64" y="277" class="muted" font-size="13">Sharing</text>
  <line x1="44" y1="300" x2="166" y2="300" class="line"/>
  <text x="64" y="330" class="muted" font-size="13">Profile</text>
  <text x="64" y="363" class="muted" font-size="13">Admin</text>

  <!-- header -->
  <text x="214" y="104" class="ink" font-size="22" font-weight="bold">My Trips</text>
  <rect x="720" y="86" width="140" height="30" rx="15" class="chip"/>
  <text x="742" y="106" class="chipt" font-size="12">+ New trip</text>

  <!-- tabs -->
  <rect x="214" y="130" width="92" height="28" rx="14" class="chip"/>
  <text x="232" y="149" class="chipt" font-size="12">Current</text>
  <text x="324" y="149" class="muted" font-size="12">Upcoming</text>
  <text x="412" y="149" class="muted" font-size="12">Past</text>
  <line x1="214" y1="172" x2="860" y2="172" class="line"/>

  <!-- current trip hero -->
  <rect x="214" y="188" width="646" height="120" rx="10" class="card"/>
  <rect x="214" y="188" width="6" height="120" class="accent"/>
  <text x="238" y="220" class="ink" font-size="17" font-weight="bold">Japan — Spring 2026</text>
  <text x="238" y="242" class="muted" font-size="12">Tokyo · Kyoto · Osaka</text>
  <text x="238" y="278" class="accent" font-size="12" font-weight="bold">Day 4 of 12 · today</text>
  <text x="238" y="296" class="muted" font-size="11">Apr 02 – Apr 14, 2026</text>
  <!-- progress -->
  <rect x="560" y="270" width="270" height="8" rx="4" fill="#eeeeee"/>
  <rect x="560" y="270" width="90" height="8" rx="4" class="accent"/>
  <text x="560" y="258" class="muted" font-size="11">Spent €640 / €1,800 budget</text>
  <!-- avatars (shared) -->
  <circle cx="780" cy="214" r="12" fill="#111111"/><text x="775" y="218" class="chipt" font-size="10">G</text>
  <circle cx="804" cy="214" r="12" fill="#2f6f6a"/><text x="800" y="218" class="chipt" font-size="10">M</text>

  <text x="214" y="340" class="muted" font-size="12" font-weight="bold">UPCOMING</text>

  <!-- upcoming cards -->
  <g>
    <rect x="214" y="352" width="312" height="120" rx="10" class="card"/>
    <text x="236" y="384" class="ink" font-size="15" font-weight="bold">Portugal Roadtrip</text>
    <text x="236" y="406" class="muted" font-size="12">Porto · Douro · Lisbon</text>
    <text x="236" y="448" class="muted" font-size="11">Jun 20 – Jun 28, 2026 · in 9 days</text>
    <circle cx="500" cy="378" r="11" fill="#111111"/><text x="495" y="382" class="chipt" font-size="9">G</text>
  </g>
  <g>
    <rect x="548" y="352" width="312" height="120" rx="10" class="card"/>
    <text x="570" y="384" class="ink" font-size="15" font-weight="bold">Iceland Ring Road</text>
    <text x="570" y="406" class="muted" font-size="12">Reykjavík · South Coast</text>
    <text x="570" y="448" class="muted" font-size="11">Sep 05 – Sep 15, 2026 · planning</text>
    <circle cx="834" cy="378" r="11" fill="#111111"/><text x="829" y="382" class="chipt" font-size="9">G</text>
    <circle cx="816" cy="378" r="11" fill="#b06a2c"/><text x="811" y="382" class="chipt" font-size="9">A</text>
  </g>

  <text x="214" y="504" class="muted" font-size="12" font-weight="bold">PAST</text>
  <g opacity="0.7">
    <rect x="214" y="516" width="312" height="70" rx="10" class="card"/>
    <text x="236" y="546" class="ink" font-size="14" font-weight="bold">Morocco</text>
    <text x="236" y="568" class="muted" font-size="11">Oct 2025 · journal ✓</text>
  </g>
  <g opacity="0.7">
    <rect x="548" y="516" width="312" height="70" rx="10" class="card"/>
    <text x="570" y="546" class="ink" font-size="14" font-weight="bold">Norway Fjords</text>
    <text x="570" y="568" class="muted" font-size="11">Jul 2025 · journal ✓</text>
  </g>
</svg>
