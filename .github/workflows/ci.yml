name: CI

# Lint, unit tests, and build gate every change before it can land (PRD §7.5).
# This is the base pipeline the rest of M01.5 builds on (containerise + deploy
# stages are layered on by later stories). Backend and web run as independent
# parallel jobs to keep wall-clock and CI minutes down (PRD §8.4 #4); within each
# job the build step reuses that job's warm toolchain + cache rather than paying
# for a separate stage (S2).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only need to read the repository.
permissions:
  contents: read

# A newer push to the same branch cancels the in-flight run — no point spending
# CI minutes finishing a run that's already superseded (PRD §8.4 #4). On `main`
# we never cancel: once S6/S7 add deploy stages, a cancelled run could leave a
# half-finished deploy (image pushed but service not rolled).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend — lint, vet, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # Pin to the repo's Go version — single source of truth is backend/go.mod.
          go-version-file: backend/go.mod
          # Cache the module + build cache, keyed on go.sum (PRD §8.4 #4).
          cache-dependency-path: backend/go.sum

      # gofmt is the format check (backend/README.md): any listed file fails.
      - name: Format check (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean — run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # The single backend lint command (.golangci.yml). Using action@v8 which
      # supports golangci-lint v2 (required for Go 1.25 support).
      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2
          working-directory: backend

      # Unit tests. The integration suite is build-tagged ('integration') and runs
      # in its own stage (S4) against an ephemeral DB — this stays DB-free and fast.
      - name: Unit tests
        run: go test ./...

      # Build (S2): prove every package and the binaries (cmd/api, cmd/migrate)
      # compile and link — a gate beyond `go test`'s type-check. `go vet` already
      # runs in the lint step above, so it isn't repeated here. No artifact upload:
      # the deployable container image is built and pushed in S6, not here.
      - name: Build
        run: go build ./...

  web:
    name: Web — lint, format, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # No repo-level Node pin yet; pin CI to the current LTS (Vite 8 needs
          # >=20.19/22.12). Revisit if the repo adopts an .nvmrc.
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      # Build (S2): the production bundle — `tsc -b` (typecheck) + `vite build`.
      # Catches type/bundle breakage before deploy. The bundle is rebuilt with the
      # env-injected API URL at deploy time (S8), so nothing is uploaded here.
      - name: Build (production bundle)
        run: npm run build

      # Unit/component tests (Vitest + Testing Library), added with the app shell
      # in M01.6 — e.g. the /healthz health-check view (S2). `vitest run` is a
      # one-shot (non-watch) run for CI.
      - name: Test (vitest)
        run: npm test

  infra:
    name: Infra — typecheck, lint, format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run build

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      # scripts/ has no toolchain of its own (it's run via `node scripts/dev.ts`),
      # so check its TypeScript against infra's prettier config — one shared style
      # for the repo's TS scripting, so it can't silently drift like infra did.
      - name: Format check (scripts/)
        run: npx prettier --check --config .prettierrc.json '../scripts/**/*.ts'

  image:
    name: Container image — build (no push)
    runs-on: ubuntu-latest
    # PRs only: on `main` the build-push job below is the authoritative build
    # (and pushes), so there's no need to build the image twice (PRD §8.4 #4).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Build the service image to prove it compiles in a container (S3, PRD §7.8).
      # No push here — S6 builds + pushes the SHA-tagged image to Artifact Registry
      # on `main`. GHA layer cache keeps rebuilds cheap (PRD §8.4 #4). The runner
      # is linux/amd64, matching Cloud Run's runtime.
      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: khiimori-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration tests (ephemeral DB)
    runs-on: ubuntu-latest
    # Sequenced after the backend job (lint/vet/test/build) so we don't spin up a
    # database for a change that already fails an earlier gate (PRD §8.4 #4).
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    services:
      # Throwaway Postgres for the migration integration test (M01.3 S7). Pinned to
      # Postgres 18 to match Neon's prod major version. It's runner-local and dies
      # with the job, so nothing accumulates (PRD §8.1) and there are no real DB
      # credentials to leak (PRD §8.5) — a stronger posture than masking a secret.
      # Switching to ephemeral Neon branches later is a workflow change, not a code
      # change, if testing against Neon specifically is ever wanted.
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: khiimori_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # The integration-tagged tests run against a disposable DB, each hermetic
      # (migrate up → exercise → roll back): the migration suite asserts the six
      # module schemas, the auth suite exercises user provisioning end-to-end
      # (M02.2 S5), and the trip suite exercises trip create + Owner membership
      # transactionally (M03.1 S2). A failure here gates the change. The DSN is the
      # direct (un-pooled) connection to the local service DB; it is not a secret,
      # so nothing is masked/printed. -p 1 serialises the package binaries so the
      # suites don't migrate/reset the shared DB concurrently.
      - name: Integration tests
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/khiimori_test?sslmode=disable
        # The tests t.Skip() (and Go exits 0) when DATABASE_URL_TEST is unset, so
        # guard against the gate silently passing without a DB; -v makes the run
        # visibly show the tests actually executing.
        run: |
          test -n "$DATABASE_URL_TEST" || { echo "DATABASE_URL_TEST unset — refusing to pass the integration gate without a DB"; exit 1; }
          go test -tags=integration -p 1 -v ./migrations/... ./internal/auth/... ./internal/trip/...

  gcp-auth:
    name: GCP auth (WIF) — verify
    runs-on: ubuntu-latest
    # Minting the GitHub OIDC token requires id-token: write; nothing else is
    # elevated. This same keyless auth is reused by the deploy stages (S6–S8).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Exchange GitHub's OIDC token for short-lived GCP credentials that
      # impersonate the least-privilege deployer SA — no JSON key anywhere
      # (S5, PRD §8.5). The provider name + SA email are non-secret repo
      # variables set from the IaC stack outputs (infra/cicd.ts).
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      # Prove auth works with a real authenticated call that exercises the
      # deployer's actual (repo-scoped) Artifact Registry permission. No secrets
      # are printed; a failure here means WIF/permissions are misconfigured.
      - name: Verify authenticated access
        run: |
          echo "Authenticated as: $(gcloud config get-value account 2>/dev/null)"
          gcloud artifacts repositories describe "${{ vars.GCP_AR_REPO }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --location="${{ vars.GCP_REGION }}" \
            --format="value(name)"

  build-push:
    name: Build & push image (main)
    runs-on: ubuntu-latest
    # Deploy path: only on a real push to main, and only after every gate passed.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, web, integration]
    permissions:
      contents: read
      id-token: write
    # Expose the SHA-tagged image reference so the deploy stage (S7) consumes the
    # exact image this job pushed — no moving tag for the deploy reference.
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Immutable, traceable reference: <registry>/<project>/<repo>/api:<commit>.
      - id: ref
        run: |
          echo "image=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Keyless auth (S5); request an access token to log Docker into Artifact Registry.
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
          token_format: access_token

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Build from the S3 Dockerfile and push the SHA tag (+ a convenience :latest).
      # The deploy (S7) pins to the SHA tag, never :latest. GHA cache shared with
      # the PR image job keeps this fast (PRD §8.4 #4).
      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          # Pin to Cloud Run's runtime arch so the pushed image always deploys,
          # regardless of the runner's default architecture.
          platforms: linux/amd64
          tags: |
            ${{ steps.ref.outputs.image }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run (main)
    runs-on: ubuntu-latest
    # Serialised AFTER pulumi-up so the two never modify the Cloud Run service
    # concurrently (a parallel update can 409) and the image revision inherits the
    # env pulumi reconciled. `!cancelled()` + the result checks let deploy still
    # run when pulumi-up is *skipped* (stack not yet configured) while blocking on
    # a pulumi-up *failure* (don't ship onto a half-reconciled service).
    if: >-
      !cancelled() && github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.build-push.result == 'success' && needs.pulumi-up.result != 'failure'
    # Runs after the image is pushed (consumes its SHA-tagged reference) and after
    # the infra reconcile.
    needs: [build-push, pulumi-up]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      # Migrations run BEFORE the new revision serves traffic (PRD §7.6). The
      # owner direct DSN is fetched from Secret Manager (never a CI secret/log)
      # and masked; the M01.3 runner applies forward migrations only. A failure
      # here aborts the job, so the new image never deploys against a stale schema.
      - name: Run database migrations
        working-directory: backend
        run: |
          DATABASE_URL_DIRECT="$(gcloud secrets versions access latest \
            --secret=khiimori-database-url-direct --project=${{ vars.GCP_PROJECT_ID }})"
          echo "::add-mask::$DATABASE_URL_DIRECT"
          export DATABASE_URL_DIRECT
          go run ./cmd/migrate up

      # Roll the IaC-managed service to the exact SHA-tagged image from S6. Only
      # the image changes — the service's SA, secrets, scaling and probes are
      # owned by Pulumi (which ignores the image), so there's no config drift.
      # `gcloud run deploy` blocks until the new revision is serving, i.e. it
      # passed its /readyz startup probe — a bad revision fails the stage here.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy khiimori-api \
            --image="${{ needs.build-push.outputs.image }}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      # Belt-and-suspenders: independently confirm the live revision is ready.
      # Retry a few times — with minInstances=0 the warm instance from the deploy
      # may have scaled to zero, so this can trigger a cold start + Neon wake and
      # briefly 503 before serving (the startup-probe window is ~60s).
      - name: Verify deployed revision
        run: |
          url="$(gcloud run services describe khiimori-api \
            --region=${{ vars.GCP_REGION }} --project=${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.url)')"
          echo "Service URL: $url"
          code=""
          for i in $(seq 1 6); do
            code="$(curl -fsS -o /dev/null -w '%{http_code}' "$url/readyz" || true)"
            [ "$code" = "200" ] && break
            echo "/readyz -> $code (attempt $i), retrying…"; sleep 5
          done
          echo "/readyz -> $code"
          test "$code" = "200"

  deploy-web:
    name: Deploy web to Firebase Hosting (main)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Runs after the web gate (lint/format/build) passes.
    needs: [web]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      # Inject the API base URL at build time — no hardcoded prod URL (aligns with
      # M01.6 S1). The variable is the Cloud Run service URL.
      - name: Build web (production)
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
        # Fail loudly rather than ship a bundle with an empty API base URL (a
        # silent prod misconfig once M01.6 consumes it).
        run: |
          test -n "$VITE_API_BASE_URL" || { echo "API_BASE_URL repo variable is empty — refusing to build the web app without an API base URL"; exit 1; }
          npm run build

      # Keyless auth (S5): request an access token in addition to the WIF credential
      # file — Firebase CLI v15 doesn't reliably pick up external-account credential
      # files as ADC, causing intermittent "Failed to authenticate" failures. Passing
      # the short-lived access token via GOOGLE_OAUTH_ACCESS_TOKEN is the reliable fix.
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
          token_format: access_token

      # Atomic release to the M01.4 Hosting site (target in firebase.json). The
      # CLI prints the Hosting URL, satisfying the "report the URL" AC.
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: npx --yes firebase-tools@15 deploy --only hosting --project "${{ vars.GCP_PROJECT_ID }}" --non-interactive

  pulumi-up:
    name: Reconcile infra (pulumi up, main)
    runs-on: ubuntu-latest
    # Main-only, and skipped until the Pulumi stack is wired up: set the
    # PULUMI_STACK_NAME repo variable (e.g. <pulumi-org>/khiimori/dev) and the
    # PULUMI_ACCESS_TOKEN repo secret. Once set, every push to main reconciles
    # infra/ automatically, so a merged config change (e.g. the Cloud Run
    # CORS_ALLOWED_ORIGINS / scaling / secret wiring) goes live with no manual
    # `pulumi up`. The deployer SA is broadened to project owner for this (see
    # infra/cicd.ts) — and the very first apply of that role is a manual bootstrap.
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      vars.PULUMI_STACK_NAME != ''
    # Reconcile only on a fully-green main build (same gates as build-push, plus
    # the infra gate) so a broken change isn't applied to live infra.
    needs: [backend, web, infra, integration]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install deps
        working-directory: infra
        run: npm ci

      # Keyless auth as the deployer SA (now project owner so a full reconcile can
      # touch IAM/SAs/secrets/the WIF pool — see infra/cicd.ts). Sets ADC, which
      # Pulumi's gcp provider uses.
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      # Reconcile the stack. refresh:true adopts live state first — notably the
      # SHA-tagged image the deploy job sets out-of-band (cloudRun.ts ignoreChanges
      # keeps it, so this never reverts the running image to the placeholder).
      # Config comes from the committed Pulumi.<stack>.yaml; secret config stays
      # encrypted by the Pulumi Cloud backend (decrypted via PULUMI_ACCESS_TOKEN).
      - name: pulumi up
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        with:
          command: up
          stack-name: ${{ vars.PULUMI_STACK_NAME }}
          work-dir: infra
          refresh: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  restrict-maps-key:
    name: Apply Maps API key restrictions (idempotent)
    runs-on: ubuntu-latest
    # Main-only, after pulumi has reconciled infra so any newly-provisioned
    # Maps key exists before we try to restrict it. `!cancelled()` + the result
    # check let this job run even when pulumi-up is *skipped* (PULUMI_STACK_NAME
    # not yet set) but block on a pulumi-up *failure*.
    if: >-
      !cancelled() && github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.pulumi-up.result != 'failure'
    needs: [pulumi-up]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      # Apply API-target restrictions to every non-Firebase API key in the project.
      # This is idempotent — re-applying the same restriction list is a no-op from
      # GCP's perspective. Currently a no-op (no Maps key resource exists yet);
      # becomes active automatically once a Maps API key is created (M07).
      #
      # Restriction list (all three APIs the Maps proxy will use — M07):
      #   maps-backend.googleapis.com       Maps JavaScript API
      #   geocoding-backend.googleapis.com  Geocoding API
      #   places-backend.googleapis.com     Places API
      #
      # The Firebase-auto-created browser key is excluded by display-name filter so
      # its existing Firebase restrictions are never touched.
      - name: Apply Maps API key restrictions
        run: |
          # List all API keys that are NOT the Firebase auto-created browser key.
          mapfile -t key_uids < <(gcloud alpha services api-keys list \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --filter="NOT displayName~'auto created by Firebase'" \
            --format="value(uid)" 2>/dev/null || true)

          if [ "${#key_uids[@]}" -eq 0 ] || [ -z "${key_uids[0]}" ]; then
            echo "No non-Firebase API key found — restriction step is a no-op."
            exit 0
          fi

          for uid in "${key_uids[@]}"; do
            [ -z "$uid" ] && continue
            echo "Applying Maps API restrictions to key: $uid"
            gcloud alpha services api-keys update "$uid" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --api-target=service=maps-backend.googleapis.com \
              --api-target=service=geocoding-backend.googleapis.com \
              --api-target=service=places-backend.googleapis.com \
              --quiet
            echo "Done: $uid"
          done

  e2e:
    name: E2E smoke (deployed env) [placeholder]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # After both deploys so there's a live target to exercise (S9). Milestone 10
    # fills in the critical-journey tests here (see e2e/README.md).
    needs: [deploy, deploy-web]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Real smoke check against the deployed environment — API /readyz and the
      # web shell must serve. Targets are config-driven (repo variables) so this
      # can point at a dedicated staging/preview env later with no workflow change.
      - name: Smoke check the deployed environment
        env:
          E2E_API_URL: ${{ vars.API_BASE_URL }}
          E2E_WEB_URL: ${{ vars.WEB_BASE_URL }}
        run: bash e2e/smoke.sh
