name: CI

# Lint, unit tests, and build gate every change before it can land (PRD §7.5).
# This is the base pipeline the rest of M01.5 builds on (containerise + deploy
# stages are layered on by later stories). Backend and web run as independent
# parallel jobs to keep wall-clock and CI minutes down (PRD §8.4 #4); within each
# job the build step reuses that job's warm toolchain + cache rather than paying
# for a separate stage (S2).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only need to read the repository.
permissions:
  contents: read

# A newer push to the same branch cancels the in-flight run — no point spending
# CI minutes finishing a run that's already superseded (PRD §8.4 #4). On `main`
# we never cancel: once S6/S7 add deploy stages, a cancelled run could leave a
# half-finished deploy (image pushed but service not rolled).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend — lint, vet, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin to the repo's Go version — single source of truth is backend/go.mod.
          go-version-file: backend/go.mod
          # Cache the module + build cache, keyed on go.sum (PRD §8.4 #4).
          cache-dependency-path: backend/go.sum

      # gofmt is the format check (backend/README.md): any listed file fails.
      - name: Format check (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean — run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # The single backend lint command (.golangci.yml). Pinned to the v1.x line
      # that matches the repo's v1-format config; action@v6 is the v1 line.
      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.2
          working-directory: backend

      # Unit tests. The integration suite is build-tagged ('integration') and runs
      # in its own stage (S4) against an ephemeral DB — this stays DB-free and fast.
      - name: Unit tests
        run: go test ./...

      # Build (S2): prove every package and the binaries (cmd/api, cmd/migrate)
      # compile and link — a gate beyond `go test`'s type-check. `go vet` already
      # runs in the lint step above, so it isn't repeated here. No artifact upload:
      # the deployable container image is built and pushed in S6, not here.
      - name: Build
        run: go build ./...

  web:
    name: Web — lint, format, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # No repo-level Node pin yet; pin CI to the current LTS (Vite 8 needs
          # >=20.19/22.12). Revisit if the repo adopts an .nvmrc.
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      # Build (S2): the production bundle — `tsc -b` (typecheck) + `vite build`.
      # Catches type/bundle breakage before deploy. The bundle is rebuilt with the
      # env-injected API URL at deploy time (S8), so nothing is uploaded here.
      - name: Build (production bundle)
        run: npm run build

      # NB: the web app has no unit-test suite yet (the frontend shell lands in
      # M01.6). When tests are added (e.g. vitest), add an "npm test" step here —
      # the job is already structured for it.

  image:
    name: Container image — build (no push)
    runs-on: ubuntu-latest
    # PRs only: on `main` the build-push job below is the authoritative build
    # (and pushes), so there's no need to build the image twice (PRD §8.4 #4).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the service image to prove it compiles in a container (S3, PRD §7.8).
      # No push here — S6 builds + pushes the SHA-tagged image to Artifact Registry
      # on `main`. GHA layer cache keeps rebuilds cheap (PRD §8.4 #4). The runner
      # is linux/amd64, matching Cloud Run's runtime.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: khiimori-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration tests (ephemeral DB)
    runs-on: ubuntu-latest
    # Sequenced after the backend job (lint/vet/test/build) so we don't spin up a
    # database for a change that already fails an earlier gate (PRD §8.4 #4).
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    services:
      # Throwaway Postgres for the migration integration test (M01.3 S7). Pinned to
      # Postgres 18 to match Neon's prod major version. It's runner-local and dies
      # with the job, so nothing accumulates (PRD §8.1) and there are no real DB
      # credentials to leak (PRD §8.5) — a stronger posture than masking a secret.
      # Switching to ephemeral Neon branches later is a workflow change, not a code
      # change, if testing against Neon specifically is ever wanted.
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: khiimori_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # The integration-tagged migration test applies the full set, asserts the six
      # module schemas exist, then rolls back — hermetic against a disposable DB. A
      # failure here gates the change. The DSN is the direct (un-pooled) connection
      # to the local service DB; it is not a secret, so nothing is masked/printed.
      - name: Integration tests
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/khiimori_test?sslmode=disable
        # The test t.Skip()s (and Go exits 0) when DATABASE_URL_TEST is unset, so
        # guard against the gate silently passing without a DB; -v makes the run
        # visibly show the test actually executing.
        run: |
          test -n "$DATABASE_URL_TEST" || { echo "DATABASE_URL_TEST unset — refusing to pass the integration gate without a DB"; exit 1; }
          go test -tags=integration -v ./migrations/...

  gcp-auth:
    name: GCP auth (WIF) — verify
    runs-on: ubuntu-latest
    # Minting the GitHub OIDC token requires id-token: write; nothing else is
    # elevated. This same keyless auth is reused by the deploy stages (S6–S8).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Exchange GitHub's OIDC token for short-lived GCP credentials that
      # impersonate the least-privilege deployer SA — no JSON key anywhere
      # (S5, PRD §8.5). The provider name + SA email are non-secret repo
      # variables set from the IaC stack outputs (infra/cicd.ts).
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Prove auth works with a real authenticated call that exercises the
      # deployer's actual (repo-scoped) Artifact Registry permission. No secrets
      # are printed; a failure here means WIF/permissions are misconfigured.
      - name: Verify authenticated access
        run: |
          echo "Authenticated as: $(gcloud config get-value account 2>/dev/null)"
          gcloud artifacts repositories describe "${{ vars.GCP_AR_REPO }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --location="${{ vars.GCP_REGION }}" \
            --format="value(name)"

  build-push:
    name: Build & push image (main)
    runs-on: ubuntu-latest
    # Deploy path: only on a real push to main, and only after every gate passed.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, web, integration]
    permissions:
      contents: read
      id-token: write
    # Expose the SHA-tagged image reference so the deploy stage (S7) consumes the
    # exact image this job pushed — no moving tag for the deploy reference.
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      # Immutable, traceable reference: <registry>/<project>/<repo>/api:<commit>.
      - id: ref
        run: |
          echo "image=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Keyless auth (S5); request an access token to log Docker into Artifact Registry.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      # Build from the S3 Dockerfile and push the SHA tag (+ a convenience :latest).
      # The deploy (S7) pins to the SHA tag, never :latest. GHA cache shared with
      # the PR image job keeps this fast (PRD §8.4 #4).
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          # Pin to Cloud Run's runtime arch so the pushed image always deploys,
          # regardless of the runner's default architecture.
          platforms: linux/amd64
          tags: |
            ${{ steps.ref.outputs.image }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run (main)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Runs after the image is pushed; consumes its SHA-tagged reference.
    needs: [build-push]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Migrations run BEFORE the new revision serves traffic (PRD §7.6). The
      # owner direct DSN is fetched from Secret Manager (never a CI secret/log)
      # and masked; the M01.3 runner applies forward migrations only. A failure
      # here aborts the job, so the new image never deploys against a stale schema.
      - name: Run database migrations
        working-directory: backend
        run: |
          DATABASE_URL_DIRECT="$(gcloud secrets versions access latest \
            --secret=khiimori-database-url-direct --project=${{ vars.GCP_PROJECT_ID }})"
          echo "::add-mask::$DATABASE_URL_DIRECT"
          export DATABASE_URL_DIRECT
          go run ./cmd/migrate up

      # Roll the IaC-managed service to the exact SHA-tagged image from S6. Only
      # the image changes — the service's SA, secrets, scaling and probes are
      # owned by Pulumi (which ignores the image), so there's no config drift.
      # `gcloud run deploy` blocks until the new revision is serving, i.e. it
      # passed its /readyz startup probe — a bad revision fails the stage here.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy khiimori-api \
            --image="${{ needs.build-push.outputs.image }}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      # Belt-and-suspenders: independently confirm the live revision is ready.
      # Retry a few times — with minInstances=0 the warm instance from the deploy
      # may have scaled to zero, so this can trigger a cold start + Neon wake and
      # briefly 503 before serving (the startup-probe window is ~60s).
      - name: Verify deployed revision
        run: |
          url="$(gcloud run services describe khiimori-api \
            --region=${{ vars.GCP_REGION }} --project=${{ vars.GCP_PROJECT_ID }} \
            --format='value(status.url)')"
          echo "Service URL: $url"
          code=""
          for i in $(seq 1 6); do
            code="$(curl -fsS -o /dev/null -w '%{http_code}' "$url/readyz" || true)"
            [ "$code" = "200" ] && break
            echo "/readyz -> $code (attempt $i), retrying…"; sleep 5
          done
          echo "/readyz -> $code"
          test "$code" = "200"
